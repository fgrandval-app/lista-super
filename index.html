<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista Super</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d6a4f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ListaSuper">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --surface: #ffffff; --accent: #2d6a4f;
    --accent2: #52b788; --text: #1a1a1a; --muted: #888; --border: #e8e0d5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* LOGIN */
  #login-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; text-align: center; }
  #login-screen .logo { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--accent); margin-bottom: 8px; }
  #login-screen .logo span { color: var(--accent2); }
  #login-screen p { color: var(--muted); margin-bottom: 40px; font-size: 1rem; }
  .btn-google { display: flex; align-items: center; gap: 12px; padding: 14px 28px; background: #fff; border: 2px solid var(--border); border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text); cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: box-shadow 0.2s, border-color 0.2s, transform 0.1s; }
  .btn-google:hover { border-color: var(--accent2); box-shadow: 0 4px 18px rgba(0,0,0,0.13); }
  .btn-google:active { transform: scale(0.98); }

  /* APP */
  #app { display: none; flex-direction: column; flex: 1; }

  nav { background: var(--accent); padding: 0 24px; display: flex; align-items: center; box-shadow: 0 2px 12px rgba(45,106,79,0.3); position: sticky; top: 0; z-index: 100; gap: 4px; }
  .nav-logo { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.4rem; padding: 18px 0; margin-right: auto; letter-spacing: -0.5px; }
  .nav-logo span { color: var(--accent2); }
  .nav-btn { background: none; border: none; color: rgba(255,255,255,0.75); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; padding: 22px 16px; cursor: pointer; position: relative; transition: color 0.2s; white-space: nowrap; text-align: center; line-height: 1.2; }
  .nav-btn::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 3px; background: var(--accent2); border-radius: 3px 3px 0 0; transform: scaleX(0); transition: transform 0.25s ease; }
  .nav-btn:hover { color: #fff; }
  .nav-btn:hover::after, .nav-btn.active::after { transform: scaleX(1); }
  .nav-btn.active { color: #fff; }
  .nav-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.4); cursor: pointer; transition: border-color 0.2s; flex-shrink: 0; margin-left: 8px; }
  .nav-avatar:hover { border-color: var(--accent2); }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); margin-left: 6px; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.syncing { background: #f0a500; animation: pulse 1s infinite; }
  .sync-dot.error { background: #e74c3c; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  @media (max-width: 480px) {
    nav { padding: 0 10px; gap: 0; }
    .nav-logo { font-size: 1rem; padding: 14px 0; }
    .nav-btn { font-size: 0.8rem; padding: 18px 10px; }
    .nav-btn::after { left: 10px; right: 10px; }
    .nav-avatar { width: 26px; height: 26px; margin-left: 4px; }
    .sync-dot { margin-left: 4px; }
  }

  main { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 48px 24px; }
  .panel { display: none; width: 100%; max-width: 520px; animation: fadeUp 0.3s ease both; }
  .panel.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .panel-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--accent); margin-bottom: 8px; }
  .panel-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

  .input-group { display: flex; gap: 12px; }
  .input-group input[type="text"] { flex: 1; padding: 14px 18px; border: 2px solid var(--border); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 1rem; background: var(--surface); color: var(--text); transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
  .input-group input[type="text"]:focus { border-color: var(--accent2); box-shadow: 0 0 0 4px rgba(82,183,136,0.12); }
  .btn-add { padding: 14px 24px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap; text-align: center; line-height: 1.2; }
  .btn-add:hover { background: #235c42; }
  .btn-add:active { transform: scale(0.97); }

  .added-list { margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }
  .added-tag { background: var(--surface); border: 1.5px solid var(--border); border-left: 4px solid var(--accent2); border-radius: 12px; padding: 10px 14px; font-size: 0.95rem; display: flex; align-items: center; gap: 12px; animation: fadeUp 0.2s ease both; }
  .tag-thumb { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1.5px solid var(--border); }
  .img-upload-label { display: flex; align-items: center; justify-content: center; width: 46px; height: 46px; border: 2px dashed var(--border); border-radius: 8px; cursor: pointer; flex-shrink: 0; color: var(--muted); font-size: 1.3rem; transition: border-color 0.2s, color 0.2s, background 0.2s; background: #fafafa; }
  .img-upload-label:hover { border-color: var(--accent2); color: var(--accent); background: #f0faf5; }
  .img-upload-label.has-img { border-style: solid; border-color: var(--border); padding: 0; overflow: hidden; background: none; }
  .img-upload-label.has-img:hover { border-color: var(--accent2); }
  .img-upload-label.has-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-upload-input { display: none; }

  .img-btn-wrap { position: relative; flex-shrink: 0; }
  .img-picker-popup { position: absolute; top: 54px; left: 0; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,0.13); padding: 14px; z-index: 50; min-width: 250px; animation: fadeUp 0.18s ease both; }
  .img-picker-popup p { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .img-picker-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .img-picker-row input[type="text"] { flex: 1; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; color: var(--text); }
  .img-picker-row input[type="text"]:focus { border-color: var(--accent2); }
  .img-picker-row button { padding: 8px 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .img-picker-row button:hover { background: #235c42; }
  .img-picker-sep { text-align: center; color: var(--muted); font-size: 0.8rem; margin: 6px 0; }
  .img-picker-file-label { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 8px; border: 1.5px dashed var(--border); border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: var(--muted); transition: border-color 0.2s, color 0.2s; }
  .img-picker-file-label:hover { border-color: var(--accent2); color: var(--accent); }
  .img-picker-close { display: block; margin-top: 8px; text-align: center; font-size: 0.8rem; color: var(--muted); cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; width: 100%; }
  .img-picker-close:hover { color: var(--text); }

  .tag-name { flex: 1; font-weight: 500; }
  .tag-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.1rem; padding: 0 4px; transition: color 0.15s; flex-shrink: 0; }
  .tag-remove:hover { color: #e74c3c; }

  .list-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .list-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s; user-select: none; }
  .list-item:hover { border-color: var(--accent2); }
  .list-item.checked { background: #f0faf5; border-color: var(--accent2); }
  .item-name { font-size: 1rem; flex: 1; }
  .list-thumb { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1.5px solid var(--border); }
  .custom-cb { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s, border-color 0.2s; background: #fff; }
  .list-item.checked .custom-cb { background: var(--accent); border-color: var(--accent); }
  .custom-cb svg { display: none; }
  .list-item.checked .custom-cb svg { display: block; }
  .empty-msg { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.95rem; }
  .empty-msg strong { display: block; font-size: 2rem; margin-bottom: 8px; }

  .btn-super { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-family: 'Playfair Display', serif; font-size: 1.2rem; cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 16px rgba(45,106,79,0.25); }
  .btn-super:hover { background: #235c42; box-shadow: 0 6px 20px rgba(45,106,79,0.35); }
  .btn-super:active { transform: scale(0.98); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 20px; padding: 36px; max-width: 360px; width: 90%; box-shadow: 0 24px 60px rgba(0,0,0,0.2); text-align: center; transform: scale(0.9); transition: transform 0.25s ease; }
  .modal-overlay.visible .modal { transform: scale(1); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent); margin-bottom: 20px; }
  .modal-img-wrap { width: 120px; height: 120px; margin: 0 auto 16px; border-radius: 14px; overflow: hidden; background: var(--bg); display: flex; align-items: center; justify-content: center; border: 2px solid var(--border); }
  .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .modal-img-placeholder { font-size: 3rem; }
  .product-display { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--text); min-height: 52px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
  @keyframes pop { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
  .product-counter { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .btn-next { padding: 12px 28px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-next:hover { background: #235c42; }
  .btn-close { padding: 12px 20px; background: none; color: var(--muted); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .btn-close:hover { border-color: #ccc; color: var(--text); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 0.9rem; z-index: 500; transition: transform 0.3s ease; white-space: nowrap; text-align: center; line-height: 1.2; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  #loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p { color: var(--muted); font-size: 0.9rem; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Cargando…</p>
</div>

<div id="login-screen">
  <div class="logo">🛒 Lista<span>Super</span></div>
  <p>Tu lista de la compra en todos tus dispositivos</p>
  <button class="btn-google" onclick="loginWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Entrar con Google
  </button>
</div>

<div id="app">
  <nav>
    <div class="nav-logo">🛒 Lista<span>Super</span></div>
    <button class="nav-btn active" id="btn-nav1" onclick="showPanel('nuevo')">Nuevo<br>Producto</button>
    <button class="nav-btn" id="btn-nav2" onclick="showPanel('lista')">Lista<br>Super</button>
    <div class="sync-dot" id="sync-dot" title="Sincronizado"></div>
    <img class="nav-avatar" id="nav-avatar" src="" alt="U" onclick="confirmLogout()" title="Cerrar sesión" />
  </nav>
  <main>
    <div class="panel active" id="panel-nuevo">
      <h1 class="panel-title">Nuevo Producto</h1>
      <p class="panel-subtitle">Añade artículos a tu lista de la compra</p>
      <div class="input-group">
        <input type="text" id="producto-input" placeholder="Ej: Leche, Pan, Manzanas…" autocomplete="off" />
        <button class="btn-add" onclick="addProduct()">Añadir</button>
      </div>
      <div class="added-list" id="added-list"></div>
    </div>
    <div class="panel" id="panel-lista">
      <h1 class="panel-title">Lista Super</h1>
      <p class="panel-subtitle">Marca los productos que necesitas comprar</p>
      <div class="list-items" id="list-items"></div>
      <button class="btn-super" onclick="startSuper()">🛒 &nbsp;¡Super!</button>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">🛒 Tu compra</div>
    <div class="modal-img-wrap">
      <span class="modal-img-placeholder" id="modal-placeholder">🛍️</span>
      <img id="modal-img" src="" alt="" style="display:none;" />
    </div>
    <div class="product-display" id="product-display"></div>
    <div class="product-counter" id="product-counter"></div>
    <div class="modal-btns">
      <button class="btn-next" id="btn-modal-action">Siguiente →</button>
      <button class="btn-close" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, onSnapshot, setDoc }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  ⚠️  REEMPLAZA ESTOS VALORES CON LOS DE TU PROYECTO FIREBASE ║
  // ╚══════════════════════════════════════════════════════════════╝
  const firebaseConfig = {
    apiKey:            "AIzaSyDHmu0pcsKdEO4nrGUURoRQ5Yr18AYFfj8",
    authDomain:        "lista-super-563b0.firebaseapp.com",
    projectId:         "lista-super-563b0",
    storageBucket:     "lista-super-563b0.firebasestorage.app",
    messagingSenderId: "565485282599",
    appId:             "1:565485282599:web:a341c3165d162b30b93502"
  };

  const fbApp = initializeApp(firebaseConfig);
  const auth  = getAuth(fbApp);
  const db    = getFirestore(fbApp);

  let unsubSnap = null;

  window.loginWithGoogle = async () => {
    try { await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e) { showToast('Error al iniciar sesión 😕'); }
  };

  window.doLogout = async () => {
    if (unsubSnap) { unsubSnap(); unsubSnap = null; }
    await signOut(auth);
  };

  window.saveCloud = async () => {
    if (!auth.currentUser) return;
    setSyncDot('syncing');
    try {
      await setDoc(doc(db, 'lists', auth.currentUser.uid), { products });
      saveLocal();
      setSyncDot('ok');
    } catch(e) { setSyncDot('error'); showToast('Error al guardar en la nube 😕'); }
  };

  onAuthStateChanged(auth, user => {
    document.getElementById('loading-overlay').style.display = 'none';
    if (user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      const av = document.getElementById('nav-avatar');
      av.src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName||'U')}&background=2d6a4f&color=fff`;

      if (unsubSnap) unsubSnap();
      unsubSnap = onSnapshot(doc(db, 'lists', user.uid), snap => {
        products = snap.exists() ? (snap.data().products || []) : loadLocal();
        if (!snap.exists() && products.length) window.saveCloud();
        renderAddedList(); renderList(); setSyncDot('ok');
      }, () => {
        setSyncDot('error'); showToast('Sin conexión — usando datos locales');
        products = loadLocal(); renderAddedList(); renderList();
      });
    } else {
      document.getElementById('app').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      if (unsubSnap) { unsubSnap(); unsubSnap = null; }
    }
  });
</script>

<script>
  let products = [];
  let modalQueue = [], modalIdx = 0;

  const STORAGE_KEY = 'listasuper_products';
  function saveLocal() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); } catch(e){} }
  function loadLocal() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; } catch(e){ return []; } }
  function saveProducts() { saveLocal(); if (window.saveCloud) window.saveCloud(); }

  function setSyncDot(state) {
    const d = document.getElementById('sync-dot');
    d.className = 'sync-dot' + (state==='syncing' ? ' syncing' : state==='error' ? ' error' : '');
    d.title = state==='ok' ? 'Sincronizado ✓' : state==='syncing' ? 'Guardando…' : 'Error de sincronización';
  }

  function showToast(msg, ms=3000) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  function confirmLogout() { if (confirm('¿Cerrar sesión?')) window.doLogout && window.doLogout(); }

  function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'nuevo') document.getElementById('btn-nav1').classList.add('active');
    else { document.getElementById('btn-nav2').classList.add('active'); renderList(); }
  }

  function addProduct() {
    const input = document.getElementById('producto-input');
    const val = input.value.trim();
    if (!val) return;
    products.push({ name: val, imgDataUrl: null });
    input.value = ''; input.focus();
    saveProducts(); renderAddedList();
  }
  document.getElementById('producto-input').addEventListener('keydown', e => { if (e.key==='Enter') addProduct(); });

  function handleImageUpload(idx, inputEl) {
    const file = inputEl.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => { products[idx].imgDataUrl = e.target.result; saveProducts(); renderAddedList(); };
    reader.readAsDataURL(file);
  }

  let openPickerIdx = null;
  function togglePicker(event, idx) {
    event.stopPropagation(); closePicker(); openPickerIdx = idx;
    const wrap = event.currentTarget.closest('.img-btn-wrap');
    const popup = document.createElement('div');
    popup.className = 'img-picker-popup'; popup.id = 'img-picker-popup';
    popup.innerHTML = `
      <p>Imagen del producto</p>
      <div class="img-picker-row">
        <input type="text" id="url-input-${idx}" placeholder="Pega una URL de imagen…" />
        <button onclick="applyUrl(${idx})">OK</button>
      </div>
      <div class="img-picker-sep">— o —</div>
      <label class="img-picker-file-label">
        📁 Subir desde el dispositivo
        <input type="file" accept="image/*" style="display:none" onchange="handleImageUpload(${idx}, this); closePicker();" />
      </label>
      <button class="img-picker-close" onclick="closePicker()">Cancelar</button>
    `;
    wrap.appendChild(popup);
    setTimeout(() => { const u = document.getElementById(`url-input-${idx}`); if(u) u.focus(); }, 50);
  }
  function applyUrl(idx) {
    const input = document.getElementById(`url-input-${idx}`);
    const url = input ? input.value.trim() : ''; if (!url) return;
    products[idx].imgDataUrl = url; saveProducts(); closePicker(); renderAddedList();
  }
  function closePicker() { const p = document.getElementById('img-picker-popup'); if(p) p.remove(); openPickerIdx = null; }
  document.addEventListener('click', e => { const p = document.getElementById('img-picker-popup'); if(p && !p.contains(e.target)) closePicker(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closePicker(); });

  function renderAddedList() {
    const el = document.getElementById('added-list');
    if (!products.length) { el.innerHTML = ''; return; }
    const sorted = products.map((p,i) => ({...p, originalIdx:i})).sort((a,b) => a.name.localeCompare(b.name,'es',{sensitivity:'base'}));
    el.innerHTML = sorted.map(p => `
      <div class="added-tag">
        <div class="img-btn-wrap">
          <div class="img-upload-label ${p.imgDataUrl?'has-img':''}" title="${p.imgDataUrl?'Cambiar imagen':'Añadir imagen'}" onclick="togglePicker(event,${p.originalIdx})">
            ${p.imgDataUrl ? `<img class="tag-thumb" src="${p.imgDataUrl}" alt="${p.name}" />` : `📷`}
          </div>
        </div>
        <span class="tag-name">${p.name}</span>
        <button class="tag-remove" onclick="removeProduct(${p.originalIdx})">✕</button>
      </div>
    `).join('');
  }

  function removeProduct(idx) { products.splice(idx,1); saveProducts(); renderAddedList(); }

  function renderList() {
    const el = document.getElementById('list-items');
    if (!products.length) { el.innerHTML = `<div class="empty-msg"><strong>🛍️</strong>Aún no has añadido productos.<br>Ve a <em>Nuevo Producto</em> para empezar.</div>`; return; }
    const sorted = products.map((p,i) => ({...p, originalIdx:i})).sort((a,b) => a.name.localeCompare(b.name,'es',{sensitivity:'base'}));
    el.innerHTML = sorted.map(p => `
      <div class="list-item" id="item-${p.originalIdx}" onclick="toggleItem(${p.originalIdx})">
        <div class="custom-cb"><svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        ${p.imgDataUrl ? `<img class="list-thumb" src="${p.imgDataUrl}" alt="${p.name}" />` : ''}
        <span class="item-name">${p.name}</span>
      </div>
    `).join('');
  }

  function toggleItem(idx) { document.getElementById('item-'+idx).classList.toggle('checked'); }

  function startSuper() {
    const checked = [];
    document.querySelectorAll('.list-item.checked').forEach(el => { const idx = parseInt(el.id.replace('item-','')); checked.push(products[idx]); });
    if (!checked.length) { alert('Marca al menos un producto para ir al super 😊'); return; }
    modalQueue = checked; modalIdx = 0; showModalProduct();
    document.getElementById('modal-overlay').classList.add('visible');
  }

  function showModalProduct() {
    const p = modalQueue[modalIdx];
    const display = document.getElementById('product-display');
    const counter = document.getElementById('product-counter');
    const actionBtn = document.getElementById('btn-modal-action');
    const img = document.getElementById('modal-img');
    const placeholder = document.getElementById('modal-placeholder');
    display.style.animation = 'none'; display.offsetHeight; display.style.animation = 'pop 0.3s ease';
    display.textContent = p.name;
    counter.textContent = `Producto ${modalIdx+1} de ${modalQueue.length}`;
    if (p.imgDataUrl) { img.src = p.imgDataUrl; img.style.display = 'block'; placeholder.style.display = 'none'; }
    else { img.style.display = 'none'; placeholder.style.display = 'block'; }
    const isLast = modalIdx >= modalQueue.length-1;
    actionBtn.textContent = isLast ? '✓ Listo' : 'Siguiente →';
    actionBtn.onclick = isLast ? closeModal : nextProduct;
  }
  function nextProduct() { modalIdx++; if(modalIdx < modalQueue.length) showModalProduct(); else closeModal(); }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('visible'); }
  document.getElementById('modal-overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
  }
</script>
</body>
</html>
